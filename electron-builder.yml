appId: com.haqpy.citizen-hub
productName: Citizen Hub
copyright: Copyright © 2025 haqpy

directories:
  output: dist-app
  buildResources: build-resources

files:
  - dist-electron/**
  - "!**/*.ts"
  - "!**/*.map"

extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
  - from: .next/static
    to: app/.next/static
    filter:
      - "**/*"
  - from: public
    to: app/public
    filter:
      - "**/*"

asarUnpack:
  - "**/*.node"
  - "**/node_modules/@prisma/engines/**"
  - "**/node_modules/.prisma/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Citizen Hub
  installerIcon: build-resources/icon.ico
  uninstallerIcon: build-resources/icon.ico
  installerHeaderIcon: build-resources/icon.ico
  deleteAppDataOnUninstall: false
  language: "1031"
  installerLanguages:
    - en_US
    - de_DE

publish:
  provider: github
  owner: haqpy1337
  repo: hMA
  releaseType: release
