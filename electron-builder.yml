appId: com.haqpy.citizen-hub
productName: Citizen Hub
copyright: Copyright © 2025 haqpy

directories:
  output: dist-app
  buildResources: build-resources

files:
  - dist-electron/**
  - dist-renderer/**
  - node_modules/**
  - "!**/*.ts"
  - "!**/*.map"
  - "!node_modules/@types/**"
  - "!node_modules/typescript/**"
  - "!node_modules/vite/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/postcss/**"
  - "!node_modules/autoprefixer/**"
  - "!node_modules/concurrently/**"
  - "!node_modules/wait-on/**"
  - "!node_modules/sharp/**"
  - "!node_modules/png-to-ico/**"

asarUnpack:
  - "**/sql.js/dist/sql-wasm.wasm"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Citizen Hub
  installerIcon: build-resources/icon.ico
  uninstallerIcon: build-resources/icon.ico
  installerHeaderIcon: build-resources/icon.ico
  deleteAppDataOnUninstall: false
  installerLanguages:
    - en_US
    - de_DE

publish:
  provider: github
  owner: haqpy1337
  repo: citizen-hub
  releaseType: release
