appId: com.haqpy.citizen-hub
productName: Citizen Hub
copyright: Copyright © 2025 haqpy

directories:
  output: dist-app
  buildResources: build-resources

files:
  - dist-electron/**
  - dist-renderer/**
  - "!**/*.ts"
  - "!**/*.map"

asar: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Citizen Hub
  installerIcon: build-resources/icon.ico
  uninstallerIcon: build-resources/icon.ico
  installerHeaderIcon: build-resources/icon.ico
  deleteAppDataOnUninstall: false
  installerLanguages:
    - en_US
    - de_DE

publish:
  provider: github
  owner: haqpy1337
  repo: citizen-hub
  releaseType: release
